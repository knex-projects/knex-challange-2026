# Resolve upstream at request time (avoids "host not found" when app container isn't ready yet)
resolver 127.0.0.11 valid=10s;
resolver_timeout 5s;

# HTTP: ACME challenge + redirect to HTTPS (or proxy if no cert yet)
server {
    listen 80;
    server_name knex.zernis.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        set $upstream_app app:3000;
        proxy_pass http://$upstream_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

