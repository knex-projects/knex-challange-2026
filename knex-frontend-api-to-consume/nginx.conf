# Resolve upstream at request time (avoids "host not found" when app container isn't ready yet)
resolver 127.0.0.11 valid=10s;
resolver_timeout 5s;

# HTTP: ACME challenge + redirect to HTTPS (or proxy if no cert yet)
server {
    listen 80;
    server_name knex.zernis.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        set $upstream_app app:3000;
        proxy_pass http://$upstream_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name knex.zernis.space;

    ssl_certificate     /etc/letsencrypt/live/knex.zernis.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/knex.zernis.space/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    location / {
        set $upstream_app app:3000;
        proxy_pass http://$upstream_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
