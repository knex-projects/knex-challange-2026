services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knex-challange-2026-app
    expose:
      - "3000"
    env_file:
      - .env
    volumes:
      - uploads:/uploads
    depends_on:
      - db
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: knex-challange-2026-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    command: [nginx, "-g", "daemon off;"]
    depends_on:
      - app
    networks:
      - app-network
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: knex-challange-2026-certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    command: renew --webroot -w /var/www/certbot
    depends_on:
      - nginx

  db:
    image: postgres:16-alpine
    container_name: knex-challange-2026-db
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  pgdata:
  uploads:

networks:
  app-network:
    driver: bridge
